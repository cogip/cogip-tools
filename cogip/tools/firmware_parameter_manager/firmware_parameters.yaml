# Firmware parameter declarations for the motion-control MCU.
#
# Order and grouping match motion_control_parameters.hpp in the mcu-firmware submodule.
# `content` is a placeholder: at startup, firmware_parameter_manager queries the
# firmware live and overwrites these values with the actual ones.
#
# Sections are pure display metadata — every parameter is addressed on the wire
# by its name's FNV-1a hash, regardless of which section it sits in.

sections:
  - title: Odometry
    parameters:
      # qdec_*_polarity and encoder_wheels_resolution_pulses are ReadOnly firmware-side.
      - name: qdec_left_polarity
        value: { type: float, content: 0.0 }
      - name: qdec_right_polarity
        value: { type: float, content: 0.0 }
      - name: left_wheel_diameter_mm
        value: { type: float, content: 0.0 }
      - name: right_wheel_diameter_mm
        value: { type: float, content: 0.0 }
      - name: encoder_wheels_distance_mm
        value: { type: float, content: 0.0 }
      - name: encoder_wheels_resolution_pulses
        value: { type: float, content: 0.0 }

  # Gated by #ifdef ROBOT_HAS_OTOS in firmware. Non-OTOS robots return NOT_FOUND;
  # the shell marks them unavailable and removes them from autocompletion.
  - title: OTOS localization
    parameters:
      - name: otos_linear_scalar
        value: { type: float, content: 1.0 }
      - name: otos_angular_scalar
        value: { type: float, content: 1.0 }

  - title: QuadPID — pose / speed
    parameters:
      - name: linear_pose_pid_kp
        value: { type: float, content: 0.0 }
      - name: linear_pose_pid_ki
        value: { type: float, content: 0.0 }
      - name: linear_pose_pid_kd
        value: { type: float, content: 0.0 }
      - name: angular_pose_pid_kp
        value: { type: float, content: 0.0 }
      - name: angular_pose_pid_ki
        value: { type: float, content: 0.0 }
      - name: angular_pose_pid_kd
        value: { type: float, content: 0.0 }
      - name: linear_speed_pid_kp
        value: { type: float, content: 0.0 }
      - name: linear_speed_pid_ki
        value: { type: float, content: 0.0 }
      - name: linear_speed_pid_kd
        value: { type: float, content: 0.0 }
      - name: angular_speed_pid_kp
        value: { type: float, content: 0.0 }
      - name: angular_speed_pid_ki
        value: { type: float, content: 0.0 }
      - name: angular_speed_pid_kd
        value: { type: float, content: 0.0 }

  - title: Tracker — pose / speed
    parameters:
      - name: tracker_linear_pose_pid_kp
        value: { type: float, content: 0.0 }
      - name: tracker_linear_pose_pid_ki
        value: { type: float, content: 0.0 }
      - name: tracker_linear_pose_pid_kd
        value: { type: float, content: 0.0 }
      - name: tracker_angular_pose_pid_kp
        value: { type: float, content: 0.0 }
      - name: tracker_angular_pose_pid_ki
        value: { type: float, content: 0.0 }
      - name: tracker_angular_pose_pid_kd
        value: { type: float, content: 0.0 }
      - name: tracker_linear_speed_pid_kp
        value: { type: float, content: 0.0 }
      - name: tracker_linear_speed_pid_ki
        value: { type: float, content: 0.0 }
      - name: tracker_linear_speed_pid_kd
        value: { type: float, content: 0.0 }
      - name: tracker_angular_speed_pid_kp
        value: { type: float, content: 0.0 }
      - name: tracker_angular_speed_pid_ki
        value: { type: float, content: 0.0 }
      - name: tracker_angular_speed_pid_kd
        value: { type: float, content: 0.0 }

  - title: Pose straight filter thresholds
    parameters:
      - name: linear_threshold
        value: { type: float, content: 0.0 }
      - name: angular_threshold
        value: { type: float, content: 0.0 }
      - name: angular_intermediate_threshold
        value: { type: float, content: 0.0 }

  # Protobuf in /s; firmware applies SpeedConversion.
  - title: Speed limits
    parameters:
      - name: min_speed_linear
        value: { type: float, content: 0.0 }
      - name: max_speed_linear
        value: { type: float, content: 0.0 }
      - name: min_speed_angular
        value: { type: float, content: 0.0 }
      - name: max_speed_angular
        value: { type: float, content: 0.0 }

  # Protobuf in /s²; firmware applies AccelerationConversion.
  - title: Acceleration / deceleration limits
    parameters:
      - name: max_acc_linear
        value: { type: float, content: 0.0 }
      - name: max_dec_linear
        value: { type: float, content: 0.0 }
      - name: max_acc_angular
        value: { type: float, content: 0.0 }
      - name: max_dec_angular
        value: { type: float, content: 0.0 }
